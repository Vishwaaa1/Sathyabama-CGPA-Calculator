<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <header class="text-center py-3 bg-primary text-white">
        <h1>CGPA Calculator</h1>
        <p>Calculate your CGPA easily and accurately</p>
    </header>

    <main class="container my-4">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Enter Your Details</h2>
            
            <form id="cgpa-form">
                <div class="mb-3">
                    <label for="numSubjects" class="form-label">Number of Subjects:</label>
                    <input type="number" id="numSubjects" class="form-control" placeholder="Enter number of subjects" min="1" required>
                </div>
                
                <div id="subjectInputs" class="mt-4"></div>
                
                <div class="text-center mt-4">
                    <button type="button" id="addSubjects" class="btn btn-primary">Add Subjects</button>
                    <button type="button" id="calculate" class="btn btn-success mt-3" style="display: none;">Calculate CGPA</button>
                </div>
            </form>

            <div id="result" class="alert alert-success mt-4 d-none text-center">
                <h3>Your CGPA is: <span id="cgpaValue"></span></h3>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 bg-dark text-white">
        <p>&copy; 2025 CGPA Calculator. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
